{% load static %}

{% for review in movie.moviereview_set.all %} 

<article class="flex max-w-xl flex-col items-start justify-between pt-4 pb-6 bg-white rounded-lg shadow-md p-6 mb-4 border border-gray-100">
  <div class="flex items-center gap-x-4 text-xs">
    <span class="relative z-10 rounded-full 
    {% if review.rating < 60 %}
    bg-red-50 
    {% else %}
    bg-green-50
    {% endif %}
    px-3 py-1.5 
    font-semibold text-base text-gray-900">{{review.rating}}</span>
  </div>
  <div class="group relative">
    <h3 class="mt-2 text-lg/6 font-semibold text-gray-900 group-hover:text-gray-600">
      <a href="#">
        <span class="absolute inset-0"></span>
        {{review.title}}
      </a>
    </h3>
    
    <p class="mt-1 line-clamp-3 text-sm/6 text-gray-600">
      {{review.review}}
    </p>
  </div>
  
  <!-- SECCIÓN DE USUARIO - VERSIÓN EXTRA PEQUEÑA -->
  <div class="relative mt-4 flex items-center gap-x-2">
    <img src="{% static 'movies/knightley.jpg' %}" alt="" class="size-6 rounded-full bg-gray-50">
    <div class="text-[10px]">  <!-- Texto base más pequeño -->
      <p class="font-semibold text-gray-900">
        <a href="#">
          <span class="absolute inset-0"></span>
          {{review.user}}
        </a>
      </p>
      <p class="text-gray-500 text-[9px]">Desde: {{review.user.date_joined|date:"M Y"}}</p>
    </div>
  </div>
</article> 

{% empty %}

<div class="bg-white rounded-lg shadow-md p-8 text-center border border-gray-100">
  <p class="text-gray-600">No hay reseñas todavía</p>
  <p class="text-sm text-gray-500 mt-2">Sé el primero en comentar esta película</p>
</div>

{% endfor %}
