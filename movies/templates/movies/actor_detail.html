{% extends "movies/base.html" %}

{% block content %}
<div style="max-width: 900px; margin: 40px auto; color: white; display: flex; gap: 40px; padding: 20px;">
    <div style="flex: 0 0 300px;">
        <img src="https://image.tmdb.org/t/p/h632{{ actor.photo_url }}" 
     style="width: 100%; border-radius: 15px; border: 2px solid #e5b509;"
     onerror="this.src='https://ui-avatars.com/api/?name={{ actor.name|urlencode }}&size=300';">
    </div>
    <div style="flex: 1;">
        <h1 style="color: #e5b509; font-size: 40px; margin-bottom: 20px;">{{ actor.name }}</h1>
        <h3 style="color: #e5b509;">Biografía</h3>
        <p style="line-height: 1.8; color: #ccc;">{{ actor.biography|default:"No hay biografía disponible para este actor." }}</p>
        
        <a href="javascript:history.back()" style="display: inline-block; margin-top: 30px; color: #e5b509; text-decoration: none; border: 1px solid #e5b509; padding: 10px 20px; border-radius: 5px;">
            ← Volver
        </a>
    </div>
</div>
{% endblock %}
